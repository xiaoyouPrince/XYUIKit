name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm-ios-build:
    name: SPM iOS Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Swift Package
        run: scripts/verify_spm_ios.sh

  demo-ios-build:
    name: Demo iOS Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Build Demo
        run: scripts/verify_demo_ios.sh --pod-install

  tests-ios:
    name: Tests iOS Simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Tests
        run: scripts/run_tests_ios_simulator.sh

  pod-lint:
    name: CocoaPods Lint
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Lint Podspec
        run: scripts/verify_pod_lint.sh
